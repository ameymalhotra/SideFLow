<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideFlow</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <section id="status-card" class="status-card">
        <div class="status-topline">SideFlow Extension</div>
        <div class="status-row">
          <div class="status-copy">
            <div id="status-text" class="status-text">Connecting…</div>
            <p id="status-sub" class="status-sub">Checking desktop bridge</p>
          </div>
          <span class="status-indicator" aria-hidden="true">
            <span class="status-dot"></span>
          </span>
        </div>
        <button id="launch-app" class="launch-button" type="button">Launch main app</button>
      </section>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
